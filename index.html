<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawng Hkio Cannabis Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="bg-green-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide text-green-300">🌿 Nawng Hkio Cannabis Store</h1>
            <button onclick="toggleCart()" class="bg-green-600 px-4 py-2 rounded-full font-semibold">
                🛒 Cart (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 my-6">
        <h2 class="text-2xl font-bold mb-6 border-b border-green-700 pb-2 text-green-400">Our Products</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="product-list"></div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-lg max-w-md w-full border border-green-700">
            <h3 class="text-xl font-bold mb-4 text-green-400">Order Details</h3>
            <div id="cart-items" class="space-y-3 mb-4 max-h-60 overflow-y-auto"></div>
            <div class="border-t border-gray-700 pt-3 mb-4">
                <p class="text-right font-bold">Total: <span id="cart-total">0</span> MMK</p>
            </div>
            <form id="order-form" onsubmit="submitOrder(event)" class="space-y-3">
                <input type="text" id="cus-name" placeholder="သင့်အမည်" required class="w-full p-2 rounded bg-gray-700 border border-gray-600">
                <input type="tel" id="cus-phone" placeholder="ဖုန်းနံပါတ်" required class="w-full p-2 rounded bg-gray-700 border border-gray-600">
                <textarea id="cus-address" placeholder="ပို့ဆောင်ပေးရမည့် လိပ်စာ" required class="w-full p-2 rounded bg-gray-700 border border-gray-600"></textarea>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="toggleCart()" class="w-1/2 bg-gray-600 py-2 rounded font-semibold">ပိတ်မည်</button>
                    <button type="submit" class="w-1/2 bg-green-600 py-2 rounded font-semibold">Order တင်မည်</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, title: "Premium Strain A", price: 25000, desc: "High quality indoor grown strain.", img: "https://placehold.co/300x200/22c55e/ffffff?text=Strain+A" },
            { id: 2, title: "Premium Strain B", price: 30000, desc: "Relaxing and calming effect.", img: "https://placehold.co/300x200/22c55e/ffffff?text=Strain+B" },
            { id: 3, title: "CBD Oil 10ml", price: 45000, desc: "Pure organic CBD extract.", img: "https://placehold.co/300x200/22c55e/ffffff?text=CBD+Oil" }
        ];
        let cart = [];
        function displayProducts() {
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                    <img src="${p.img}" alt="${p.title}" class="w-full h-48 object-cover rounded mb-4">
                    <h3 class="text-xl font-bold text-green-300">${p.title}</h3>
                    <p class="text-gray-400 text-sm my-2">${p.desc}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-lg font-semibold text-yellow-400">${p.price.toLocaleString()} MMK</span>
                        <button onclick="addToCart(${p.id})" class="bg-green-600 px-3 py-1.5 rounded text-sm">Cart ထဲထည့်ရန်</button>
                    </div>
                </div>
            `).join('');
        }
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const item = cart.find(c => c.id === id);
            if (item) { item.quantity++; } else { cart.push({ ...product, quantity: 1 }); }
            updateCartUI();
        }
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-items').innerHTML = cart.map(item => `
                <div class="flex justify-between items-center text-sm bg-gray-700 p-2 rounded">
                    <div><p class="font-semibold text-green-300">${item.title}</p><p class="text-gray-400">${item.price.toLocaleString()} x ${item.quantity}</p></div>
                    <span class="font-bold text-yellow-400">${(item.price * item.quantity).toLocaleString()} MMK</span>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toLocaleString();
        }
        function toggleCart() { const m = document.getElementById('cart-modal'); m.classList.toggle('hidden'); m.classList.toggle('flex'); }
        function submitOrder(e) { e.preventDefault(); alert('အော်ဒါတင်ခြင်း အောင်မြင်ပါသည်!'); cart = []; updateCartUI(); toggleCart(); document.getElementById('order-form').reset(); }
        displayProducts();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawng Hkio Cannabis Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <nav class="bg-green-900 p-4 flex justify-between items-center shadow-md sticky top-0 z-50">
        <h1 class="text-xl font-bold text-green-300 flex items-center gap-1">🌿 နောင်ချိုဆေးခြောက်ဆိုင်</h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('admin-modal').classList.remove('hidden')" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded text-xs font-semibold transition">⚙️ Admin</button>
        </div>
    </nav>

    <main class="container mx-auto p-4 my-6">
        <h2 class="text-2xl font-bold mb-6 border-b border-green-800 pb-2 text-green-400">ကျွန်ုပ်တို့ဆိုင်မှ ပစ္စည်းများ</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="products-grid"></div>
    </main>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 p-4 flex items-center justify-center z-50">
        <div class="bg-slate-800 p-6 rounded-lg w-full max-w-md border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-yellow-400">⚙️ ဆိုင်ခန်း စီမံခန့်ခွဲရန်</h2>
                <button onclick="document.getElementById('admin-modal').classList.add('hidden')" class="text-slate-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div class="space-y-3 bg-slate-950 p-4 rounded mb-4">
                <p class="text-xs font-bold text-green-400">ပစ္စည်းအသစ်ထည့်ရန်</p>
                <input type="text" id="name" placeholder="ပစ္စည်းနာမည် (ဥပမာ- Pink Candy)" class="w-full p-2 bg-slate-800 rounded text-sm border border-slate-700 text-white">
                <input type="number" id="price" placeholder="ဈေးနှုန်း ကျပ်ငွေ (ဥပမာ- 30000)" class="w-full p-2 bg-slate-800 rounded text-sm border border-slate-700 text-white">
                <input type="text" id="desc" placeholder="အာနိသင် / အညွှန်း (ဥပမာ- THC 28% Indica)" class="w-full p-2 bg-slate-800 rounded text-sm border border-slate-700 text-white">
                <button onclick="addProduct()" class="w-full bg-green-600 hover:bg-green-700 p-2 rounded text-sm font-bold transition">ဆိုင်ထဲသို့ ထည့်မည်</button>
            </div>

            <p class="text-xs font-bold text-slate-400 mb-2">လက်ရှိတင်ထားသော ပစ္စည်းများ</p>
            <div id="admin-list" class="space-y-2 max-h-40 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // Default Starting Database
        const defaultItems = [
            { name: "Pink Candy", price: 30000, desc: "THC 28% | Indica - High Quality Strain" },
            { name: "Premium Strain B", price: 25000, desc: "Relaxing and calming effect." }
        ];

        let products = JSON.parse(localStorage.getItem('nawng_products')) || defaultItems;
        if(!localStorage.getItem('nawng_products')) {
            localStorage.setItem('nawng_products', JSON.stringify(products));
        }

        function render() {
            // Main Display
            const grid = document.getElementById('products-grid');
            if(products.length === 0) {
                grid.innerHTML = `<p class="text-slate-400 text-sm col-span-3 text-center py-8">ဆိုင်ထဲတွင် ပစ္စည်းမရှိသေးပါ။ Admin ထဲတွင် ဖြည့်စွက်ပေးပါ။</p>`;
            } else {
                grid.innerHTML = products.map((p, i) => `
                    <div class="bg-slate-800 p-5 rounded-lg border border-slate-700 flex flex-col justify-between">
                        <div>
                            <div class="w-full h-40 bg-green-950 rounded flex items-center justify-center mb-4 border border-green-800">
                                <span class="text-4xl">🌿</span>
                            </div>
                            <h3 class="text-xl font-bold text-green-400">${p.name}</h3>
                            <p class="text-sm text-slate-400 mt-1">${p.desc}</p>
                        </div>
                        <div class="mt-4 pt-2 border-t border-slate-700 flex justify-between items-center">
                            <span class="text-lg font-bold text-yellow-500">${Number(p.price).toLocaleString()} MMK</span>
                            <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-300">အဆင်သင့်ရှိသည်</span>
                        </div>
                    </div>
                `).join('');
            }

            // Admin Control List
            const adminList = document.getElementById('admin-list');
            adminList.innerHTML = products.map((p, i) => `
                <div class="flex justify-between items-center bg-slate-900 p-2 rounded text-xs border border-slate-700">
                    <div class="truncate max-w-[200px]">
                        <p class="font-bold text-green-400">${p.name} (${Number(p.price).toLocaleString()} Ks)</p>
                    </div>
                    <button onclick="deleteProduct(${i})" class="text-red-400 hover:text-red-300 font-medium">ဖျက်မည်</button>
                </div>
            `).join('');
        }

        function addProduct() {
            const name = document.getElementById('name').value.trim();
            const price = parseInt(document.getElementById('price').value);
            const desc = document.getElementById('desc').value.trim();
            
            if(name && price) {
                products.push({ name, price, desc: desc || "Premium Quality" });
                localStorage.setItem('nawng_products', JSON.stringify(products));
                render();
                
                // Clear Inputs
                document.getElementById('name').value = "";
                document.getElementById('price').value = "";
                document.getElementById('desc').value = "";
            } else {
                alert("ပစ္စည်းနာမည်နှင့် ဈေးနှုန်းကို သေချာဖြည့်ပေးပါဗျာ။");
            }
        }

        function deleteProduct(i) {
            if(confirm("ဤပစ္စည်းကို ဖျက်ရန် သေချာပါသလား?")) {
                products.splice(i, 1);
                localStorage.setItem('nawng_products', JSON.stringify(products));
                render();
            }
        }

        // Initial Load
        render();
    </script>
</body>
</html>

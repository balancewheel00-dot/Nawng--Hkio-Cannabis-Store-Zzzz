<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawng Hkio Cannabis Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <nav class="bg-green-900 p-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold text-green-300">🌿 နောင်ချိုဆေးခြောက်ဆိုင်</h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('admin-modal').classList.remove('hidden')" class="bg-slate-700 px-3 py-1 rounded text-sm">⚙️ Admin</button>
        </div>
    </nav>

    <main class="p-4 grid md:grid-cols-3 gap-4" id="products-grid"></main>

    <!-- Admin Modal -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 p-4 flex items-center justify-center">
        <div class="bg-slate-800 p-6 rounded-lg w-full max-w-md">
            <h2 class="text-xl mb-4 font-bold text-yellow-400">Admin ဆက်တင်</h2>
            <input type="text" id="name" placeholder="နာမည် (ဥပမာ- Pink Candy)" class="w-full p-2 mb-2 bg-slate-700 rounded">
            <input type="number" id="price" placeholder="ဈေးနှုန်း (MMK)" class="w-full p-2 mb-2 bg-slate-700 rounded">
            <input type="text" id="desc" placeholder="အကြောင်းအရာ (THC 28% Indica)" class="w-full p-2 mb-4 bg-slate-700 rounded">
            <button onclick="addProduct()" class="w-full bg-green-600 p-2 rounded font-bold">သိမ်းဆည်းမည်</button>
            <button onclick="document.getElementById('admin-modal').classList.add('hidden')" class="w-full mt-2 bg-slate-600 p-2 rounded">ပိတ်မည်</button>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('nawng_products')) || [
            { name: "Pink Candy", price: 30000, desc: "THC 28% Indica" }
        ];

        function render() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map((p, i) => `
                <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                    <h3 class="text-xl font-bold text-green-400">${p.name}</h3>
                    <p class="text-sm text-slate-400">${p.desc}</p>
                    <p class="text-lg font-bold text-yellow-500 my-2">${p.price.toLocaleString()} MMK</p>
                    <button onclick="deleteProduct(${i})" class="text-red-400 text-sm">ဖျက်မည်</button>
                </div>
            `).join('');
        }

        function addProduct() {
            const name = document.getElementById('name').value;
            const price = parseInt(document.getElementById('price').value);
            const desc = document.getElementById('desc').value;
            if(name && price) {
                products.push({name, price, desc});
                localStorage.setItem('nawng_products', JSON.stringify(products));
                render();
                document.getElementById('admin-modal').classList.add('hidden');
            }
        }

        function deleteProduct(i) {
            products.splice(i, 1);
            localStorage.setItem('nawng_products', JSON.stringify(products));
            render();
        }

        render();
    </script>
</body>
</html>
